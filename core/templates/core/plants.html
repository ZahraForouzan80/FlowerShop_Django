{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>فروشگاه گل و گیاه فروزان</title>
        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <!-- Bootstrap icons-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="{% static 'css/styles.css' %}" rel="stylesheet">
    </head>
    <body class="d-flex flex-column h-100">
        <main class="flex-shrink-0">
            <!-- Navigation-->
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
                <div class="container px-5">
                    <a class="navbar-brand" href="{% url 'home' %}">گل و گیاه فروزان</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                            <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">خانه</a></li>
                        </ul>
                    </div>
                </div>
            </nav>
            

            <div class="container mt-5">
              <div class="row gx-5">
                {% for plant in plants %}
                <div class="col-lg-4 mb-5">
                    <div class="card h-100 shadow border-0">
                        <!-- عکس محصول -->
                        <img class="card-img-top"
                             src="{{ plant.image.url }}"
                             style="height:300px;object-fit:cover;"
                             alt="{{ plant.name }}">
                        <div class="card-body">
                            <div class="badge bg-success rounded-pill mb-2">
                                گیاه آپارتمانی
                            </div>
                            <h4 class="fw-bold">
                                {{ plant.name }}
                            </h4>
                            <p class="text-muted">{{ plant.description|truncatewords:20 }}</p>
                        </div>
                        <div class="card-footer bg-white border-0">
                            <div class="d-flex justify-content-between align-items-center">
                                <h5 class="text-success fw-bold mb-0">
                                    {{ plant.price }} تومان
                                </h5>
                                <a href="#" class="btn btn-success">مشاهده</a>
                            </div>
                        </div>
                    </div>
                </div>
                {% empty %}
                <div class="col-12 text-center">
                    <h4 class="text-muted">
                        هنوز محصولی ثبت نشده است.
                    </h4>
                </div>
                {% endfor %}
            </div>
          </div>
              <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS-->
        <script src="{% static 'js/scripts.js' %}"></script>
        </body>
</html>
